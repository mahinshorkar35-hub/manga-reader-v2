name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-engine:
    name: Rust Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check
      - run: cargo test --lib

  gui-tauri:
    name: Tauri GUI (Check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Tauri deps
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: cargo check
      - run: npm ci
      - run: npm run build

  ai-pipeline:
    name: Python AI Pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install package
        run: uv pip install --system -e .
      - name: Lint
        run: pip install ruff && ruff check src/
